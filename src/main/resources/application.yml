spring:
  application:
    name: email-manager-backend

  profiles:
    active: dev

  jpa:
    open-in-view: false

---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:emailmanagerdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  flyway:
    enabled: false

app:
  jwt-secret: dev-secret-key-change-in-production-must-be-256-bits-long-enough
  jwt-expiration-minutes: 60
  encryption-key: dev-aes-key-change-this-to-32bytes!!
  firebase:
    enabled: true
  cors:
    allowed-origins: http://localhost:3000,http://localhost:8080

server:
  port: 8082

logging:
  level:
    com.emailmanager: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update

  flyway:
    enabled: false

app:
  jwt-secret: ${JWT_SECRET}
  jwt-expiration-minutes: 60
  encryption-key: ${ENCRYPTION_KEY}
  firebase:
    enabled: true
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

server:
  port: 8082
