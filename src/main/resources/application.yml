spring:
  application:
    name: email-manager-backend

  profiles:
    active: dev

  jpa:
    open-in-view: false

---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:emailmanagerdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  flyway:
    enabled: false   # H2 dev uses ddl-auto; Flyway runs on prod Postgres only

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 30MB

app:
  jwt-secret: dev-secret-key-change-in-production-must-be-256-bits-long-enough
  jwt-expiration-minutes: 43200  # 30 days — user stays logged in
  encryption-key: dev-aes-key-change-this-to-32bytes!!
  firebase:
    enabled: true
  cors:
    allowed-origins: http://localhost:3000,http://localhost:8080
  admin:
    username: Andy
    password: admin123
  sync:
    inbox-interval-ms: 30000    # how often SyncService polls each account
    initial-sync-count: 50      # messages to seed on first sync per account

server:
  port: 8082

logging:
  level:
    com.emailmanager: DEBUG

ai:
  gemini:
    api-key: ""  # Set GEMINI_API_KEY env var to enable Gemini AI
  claude:
    api-key: ""  # Set ANTHROPIC_API_KEY env var to enable Claude AI (preferred over Gemini)
    model: claude-opus-4-5

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate   # Phase 1: Flyway is the single source of truth for schema

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true   # safe to run against existing DB (email_accounts already exists)

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 30MB

app:
  jwt-secret: ${JWT_SECRET}
  jwt-expiration-minutes: 43200  # 30 days — user stays logged in
  encryption-key: ${ENCRYPTION_KEY}
  firebase:
    enabled: true
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  admin:
    username: ${APP_USERNAME}
    password: ${APP_PASSWORD}
  sync:
    inbox-interval-ms: 30000
    initial-sync-count: 50

server:
  port: 8082

ai:
  gemini:
    api-key: ${GEMINI_API_KEY:}
  claude:
    api-key: ${ANTHROPIC_API_KEY:}
    model: ${CLAUDE_MODEL:claude-opus-4-5}
