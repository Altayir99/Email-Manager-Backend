# Test profile — uses H2 in-memory, no Flyway, no Firebase
spring.application.name=email-manager-backend-test
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable Flyway for tests (schema is created by ddl-auto=create-drop)
spring.flyway.enabled=false

# Disable Firebase initialisation (no service account in test environment)
app.firebase.enabled=false
app.jwt-secret=test-secret-key-for-unit-tests-only-32chars
app.jwt-expiration-minutes=60
app.encryption-key=test-encryption-key-32bytes-long!
app.admin.username=admin
app.admin.password=admin
